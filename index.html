<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saroaa ❤️ Tahtoha</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">
    <h1>Loading Love ❤️</h1>
</div>

<div class="login-page" id="loginPage">

    <h1>❤️ Secret Website ❤️</h1>

    <input
    type="password"
    id="password"
    placeholder="Enter Secret Word">

    <button onclick="checkPassword()">
        Unlock
    </button>

</div>

<div class="content" id="content">

    <h1>Welcome Tahtoha ❤️</h1>

    <p id="typing" class="message"></p>

    <button class="gift-btn" onclick="showGift()">
        🎁 افتح هديتي
    </button>

    <div id="giftSection">

        <div id="letter">

            <h2>💌 رسالة ليك</h2>

            <p>
            حبيت اقولك بحبك بس بطريقتي ❤️
            <br><br>
            وجودك في حياتي من أجمل الحاجات اللي حصلتلي،
            وكل يوم بيعدي بحس إني بحبك أكتر من اليوم اللي قبله ❤️
            </p>

            <br>

            <a
            href="https://www.youtube.com/results?search_query=الليل+ونجومه+حسين+الجسمي"
            target="_blank"
            class="music-btn">

            🎵 شغّل أغنيتنا

            </a>

        </div>

        <div class="gallery">

            <img src="image/1.jpeg">
            <img src="image/2.jpeg">
            <img src="image/3.jpeg">
            <img src="image/4.jpeg">
            <img src="image/5.jpeg">
            <img src="image/6.jpeg">

        </div>

    </div>

</div>

<div class="hearts"></div>

<script src="script.js"></script>

</body>
</html>
